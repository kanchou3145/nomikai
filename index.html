<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲み会 日程調整</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 780px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .header p  { font-size: 0.95rem; opacity: 0.9; }
    .body { padding: 30px; }
    .section-title {
      font-size: 1rem;
      font-weight: bold;
      color: #444;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f0f0f0;
    }
    .name-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 30px;
    }
    .name-btn {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      text-align: center;
    }
    .name-btn:hover  { border-color: #764ba2; color: #764ba2; }
    .name-btn.active { border-color: #764ba2; background: #764ba2; color: white; font-weight: bold; }
    .table-wrap { overflow-x: auto; margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead th {
      background: #f7f7f7;
      padding: 10px 6px;
      text-align: center;
      font-weight: bold;
      color: #555;
      border: 1px solid #e0e0e0;
      white-space: nowrap;
    }
    thead th.date-col { min-width: 110px; }
    tbody td {
      padding: 8px 6px;
      text-align: center;
      border: 1px solid #e0e0e0;
      vertical-align: middle;
    }
    tbody tr:hover { background: #fafafa; }
    .date-label { font-weight: 600; color: #333; }
    .day-label  { font-size: 0.75rem; color: #888; display: block; }
    .ans-group { display: flex; justify-content: center; gap: 4px; }
    .ans-btn {
      width: 36px; height: 36px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
      line-height: 1;
    }
    .ans-btn:hover { transform: scale(1.1); }
    .ans-btn[data-val="◎"].selected { background: #4CAF50; border-color: #4CAF50; color: white; }
    .ans-btn[data-val="○"].selected { background: #2196F3; border-color: #2196F3; color: white; }
    .ans-btn[data-val="△"].selected { background: #FF9800; border-color: #FF9800; color: white; }
    .ans-btn[data-val="×"].selected { background: #f44336; border-color: #f44336; color: white; }
    .legend {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-bottom: 24px; font-size: 0.82rem; color: #666;
    }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #result-panel {
      display: none;
      margin-top: 30px;
      padding: 20px;
      background: #f0fff4;
      border: 2px solid #4CAF50;
      border-radius: 12px;
    }
    #result-panel h3 { color: #2e7d32; margin-bottom: 12px; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-top: 10px; }
    .result-table th, .result-table td {
      border: 1px solid #c8e6c9;
      padding: 8px;
      text-align: center;
    }
    .result-table th { background: #e8f5e9; font-weight: bold; }
    .best-row { background: #fff9c4 !important; font-weight: bold; }
    .loading { text-align:center; color:#888; padding:20px; }
    @media (max-width: 500px) {
      .name-grid { grid-template-columns: repeat(2, 1fr); }
      .ans-btn { width: 30px; height: 30px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🍻 今季お疲れ様飲み会</h1>
    <p>7月の日程調整にご協力ください（部署内 6名）</p>
  </div>
  <div class="body">

    <p class="section-title">① お名前を選んでください</p>
    <div class="name-grid" id="nameGrid">
      <button class="name-btn" data-name="佐野">佐野</button>
      <button class="name-btn" data-name="田中">田中</button>
      <button class="name-btn" data-name="生井">生井</button>
      <button class="name-btn" data-name="斎藤">斎藤</button>
      <button class="name-btn" data-name="浮海">浮海</button>
      <button class="name-btn" data-name="粂田">粂田</button>
    </div>

    <p class="section-title">② 各日程の参加可否をお知らせください</p>
    <div class="legend">
      <span>🟢 <b>◎</b> 絶対参加できる</span>
      <span>🔵 <b>○</b> 参加できる</span>
      <span>🟠 <b>△</b> 微妙</span>
      <span>🔴 <b>×</b> 参加できない</span>
    </div>

    <div class="table-wrap">
      <table id="scheduleTable">
        <thead>
          <tr>
            <th class="date-col">日付</th>
            <th>◎○△×</th>
          </tr>
        </thead>
        <tbody id="dateRows"></tbody>
      </table>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">✅ 回答を送信する</button>

    <div id="result-panel">
      <h3>📋 全員の回答状況</h3>
      <div id="result-content"></div>
    </div>

  </div>
</div>

<script>
  // ★ここにGASのURLを貼り付けてください★
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyuwta5ksf_-7TomJ7es-YPLt8skltWEZ8QKisSvsgGlm5OqNmgkzogJczmcyru_mHC/exec";

  const candidates = [
    { date: "7/5(土)",  day: "土" },
    { date: "7/6(日)",  day: "日" },
    { date: "7/11(金)", day: "金" },
    { date: "7/12(土)", day: "土" },
    { date: "7/13(日)", day: "日" },
    { date: "7/18(金)", day: "金" },
    { date: "7/19(土)", day: "土" },
    { date: "7/20(日)", day: "日" },
    { date: "7/25(金)", day: "金" },
    { date: "7/26(土)", day: "土" },
  ];

  const members = ["佐野","田中","生井","斎藤","浮海","粂田"];
  let selectedName = null;
  let currentAnswers = {};
  let allAnswers = {};

  // テーブル生成
  const tbody = document.getElementById("dateRows");
  candidates.forEach(c => {
    const tr = document.createElement("tr");
    const tdDate = document.createElement("td");
    tdDate.innerHTML = `<span class="date-label">${c.date}</span><span class="day-label">${c.day}曜日</span>`;
    tr.appendChild(tdDate);

    const tdAns = document.createElement("td");
    const grp = document.createElement("div");
    grp.className = "ans-group";
    grp.dataset.date = c.date;
    ["◎","○","△","×"].forEach(v => {
      const btn = document.createElement("button");
      btn.className = "ans-btn";
      btn.dataset.val = v;
      btn.textContent = v;
      btn.onclick = () => selectAnswer(c.date, v, grp);
      grp.appendChild(btn);
    });
    tdAns.appendChild(grp);
    tr.appendChild(tdAns);
    tbody.appendChild(tr);
  });

  // 名前選択
  document.querySelectorAll(".name-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".name-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedName = btn.dataset.name;
      loadExistingAnswers();
    };
  });

  function loadExistingAnswers() {
    currentAnswers = allAnswers[selectedName] ? {...allAnswers[selectedName]} : {};
    document.querySelectorAll(".ans-group").forEach(grp => {
      const date = grp.dataset.date;
      grp.querySelectorAll(".ans-btn").forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.val === currentAnswers[date]);
      });
    });
  }

  function selectAnswer(date, val, grp) {
    if (!selectedName) { alert("先にお名前を選択してください！"); return; }
    currentAnswers[date] = val;
    grp.querySelectorAll(".ans-btn").forEach(btn => {
      btn.classList.toggle("selected", btn.dataset.val === val);
    });
  }

  // 送信
  async function submitAnswer() {
    if (!selectedName) { alert("お名前を選択してください！"); return; }
    const unanswered = candidates.filter(c => !currentAnswers[c.date]);
    if (unanswered.length > 0) {
      alert(`以下の日程がまだ回答されていません：\n${unanswered.map(c=>c.date).join(" / ")}`);
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "⏳ 送信中...";

    try {
      await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: selectedName, answers: currentAnswers })
      });

      allAnswers[selectedName] = {...currentAnswers};
      alert(`${selectedName}さんの回答を送信しました！\nありがとうございます🎉`);

      await fetchAndShowResult();

    } catch(err) {
      alert("送信に失敗しました。もう一度お試しください。");
    }

    btn.disabled = false;
    btn.textContent = "✅ 回答を送信する";
  }

  // GASからデータ取得して結果表示
  async function fetchAndShowResult() {
    const content = document.getElementById("result-content");
    content.innerHTML = `<p class="loading">⏳ データを読み込み中...</p>`;
    document.getElementById("result-panel").style.display = "block";

    try {
      const res = await fetch(GAS_URL + "?t=" + Date.now());
      const json = await res.json();
      if (json.status === "ok") {
        allAnswers = json.data;
        renderResult();
      }
    } catch(err) {
      content.innerHTML = `<p style="color:red;">データの取得に失敗しました。ページを再読み込みしてください。</p>`;
    }
  }

  function renderResult() {
    const scoreMap = {"◎":3,"○":2,"△":1,"×":0};
    const scores = {};
    candidates.forEach(c => {
      let total = 0, responded = 0;
      members.forEach(m => {
        if (allAnswers[m]?.[c.date] !== undefined) {
          total += scoreMap[allAnswers[m][c.date]] || 0;
          responded++;
        }
      });
      scores[c.date] = { total, responded };
    });

    const maxScore = Math.max(...Object.values(scores).map(s => s.total));
    const answeredCount = members.filter(m => allAnswers[m]).length;

    let html = `<p style="margin-bottom:10px; color:#555;">回答済み：<b>${answeredCount}</b> / ${members.length} 名</p>`;
    html += `<table class="result-table"><thead><tr><th>日程</th>`;
    members.forEach(m => html += `<th>${m}</th>`);
    html += `<th>スコア</th><th>回答数</th></tr></thead><tbody>`;

    candidates.forEach(c => {
      const isBest = scores[c.date].total === maxScore && maxScore > 0;
      html += `<tr class="${isBest ? 'best-row' : ''}">`;
      html += `<td>${c.date}${isBest ? " 👑" : ""}</td>`;
      members.forEach(m => {
        const ans = allAnswers[m]?.[c.date] || "—";
        const colors = {"◎":"#4CAF50","○":"#2196F3","△":"#FF9800","×":"#f44336","—":"#bbb"};
        html += `<td style="color:${colors[ans]};font-weight:bold;">${ans}</td>`;
      });
      html += `<td><b>${scores[c.date].total}</b></td>`;
      html += `<td>${scores[c.date].responded}名</td>`;
      html += `</tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById("result-content").innerHTML = html;
    document.getElementById("result-panel").scrollIntoView({ behavior: "smooth" });
  }

  // ページ読み込み時に既存データを取得
  window.addEventListener("load", fetchAndShowResult);
</script>
</body>
</html>
